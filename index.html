<script>

/*
=========================================================
PROMPT:
1. Add a "Start Diffusion" slider to the #controls div with
   a default value of 0 at the default position on the far left.
2. When the slider is above 0, toggle an "isDiffusing" state.
3. If diffusing:
   - STOP the existing noise generation (applyPixels).
   - "Freeze" 16 specific pixels: the 4 corners of the canvas 
     AND 12 other pixels at random coordinates.
   - These 16 pixels must capture the EXACT colors currently 
     rendered on the canvas at their specific coordinates.
   - Run an algorithm that randomly updates other pixels on the 
     page to be a weighted average of the nearest two fixed pixels
     according to how close each of them is. The rate at which
     pixels are updated in this way is determined by the slider
     position.
   - The goal is to create a perfectly smooth, fluid gradient 
     transition that fills the entire screen, anchored by 
     the 16 frozen seed colors.
=========================================================
*/

(function()

{
const canvas = document.getElementById('noiseCanvas');
const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });

const inputs =
{   k: document.getElementById('kRate'),
    b: document.getElementById('bRate'),
    c: document.getElementById('cRate'),
    g: document.getElementById('gRate'),
    y: document.getElementById('yRate'),
    r: document.getElementById('rRate'),
    w: document.getElementById('wRate'),
    m: document.getElementById('mRate'),
    blend: document.getElementById('blendRate'),
    diffuse: document.getElementById('diffuseRate') };

inputs.diffuse.value = 0;

let width, height, totalPixels, imgData, buffer;
let kSpeed = 0, bSpeed = 0, cSpeed = 0, gSpeed = 0, ySpeed = 0, rSpeed = 0, wSpeed = 0, mSpeed = 0;
let blendWeight = 0;
let diffuseSpeed = 0;
let isDiffusing = false;
let fixedPixels = [];
let fixedColors = [];
let seedMask = new Uint8Array(0);
let targetBuffer = new Uint32Array(0);
let revealOrder = [];
let revealIndex = 0;

const COLOR_K = 0xFF000000; 
const COLOR_B = 0xFFFF0000; 
const COLOR_C = 0xFFFFFF00; 
const COLOR_G = 0xFF00FF00; 
const COLOR_Y = 0xFF00FFFF; 
const COLOR_R = 0xFF0000FF; 
const COLOR_W = 0xFFFFFFFF; 
const COLOR_M = 0xFFFF00FF; 

Object.values(inputs).forEach
(input => 
{   input.addEventListener('input', updateSettings); }
);

window.addEventListener('resize', resize);

function updateSettings() 
{   const maxPixels = (totalPixels / 5) | 0;

    const calculateSpeed = (val) =>
    {   const normalized = parseFloat(val) / 100;
        return (Math.pow(normalized, 3) * maxPixels) | 0; };

    kSpeed = calculateSpeed(inputs.k.value);
    bSpeed = calculateSpeed(inputs.b.value);
    cSpeed = calculateSpeed(inputs.c.value);
    gSpeed = calculateSpeed(inputs.g.value);
    ySpeed = calculateSpeed(inputs.y.value);
    rSpeed = calculateSpeed(inputs.r.value);
    wSpeed = calculateSpeed(inputs.w.value);
    mSpeed = calculateSpeed(inputs.m.value);
    blendWeight = parseFloat(inputs.blend.value) / 100;

    const prevDiffusing = isDiffusing;
    diffuseSpeed = calculateSpeed(inputs.diffuse.value);
    isDiffusing = inputs.diffuse.value > 0;

    if (isDiffusing && !prevDiffusing) 
    {   freezePixels(); }

    const updateTrack = (el, activeColor, dimColor) =>
    {   const pct = (el.value - el.min) / (el.max - el.min) * 100;
        el.style.background = `linear-gradient(to right, ${activeColor} ${pct}%, ${dimColor} ${pct}%)`; };

    updateTrack(inputs.k, '#444444', 'rgba(68, 68, 68, 0.2)');
    updateTrack(inputs.b, '#4444ff', 'rgba(68, 68, 255, 0.2)');
    updateTrack(inputs.c, '#44ffff', 'rgba(68, 255, 255, 0.2)');
    updateTrack(inputs.g, '#44ff44', 'rgba(68, 255, 68, 0.2)');
    updateTrack(inputs.y, '#ffff44', 'rgba(255, 255, 68, 0.2)');
    updateTrack(inputs.r, '#ff4444', 'rgba(255, 68, 68, 0.2)');
    updateTrack(inputs.w, '#ffffff', 'rgba(255, 255, 255, 0.2)');
    updateTrack(inputs.m, '#ff44ff', 'rgba(255, 68, 255, 0.2)');
    updateTrack(inputs.blend, '#ffffff', 'rgba(255, 255, 255, 0.2)');
    updateTrack(inputs.diffuse, '#ff8800', 'rgba(255, 136, 0, 0.2)');
}

function resize() 
{   width = window.innerWidth;
    height = window.innerHeight;
    totalPixels = width * height;
    canvas.width = width;
    canvas.height = height;
    imgData = ctx.createImageData(width, height);
    buffer = new Uint32Array(imgData.data.buffer);
    buffer.fill(0xFF000000);
    updateSettings();
    if (isDiffusing) 
    {   freezePixels(); } }

function freezePixels() 
{   fixedPixels = [];
    fixedColors = [];
    seedMask = new Uint8Array(totalPixels);

    fixedPixels.push({ x: 0, y: 0 });
    fixedPixels.push({ x: width - 1, y: 0 });
    fixedPixels.push({ x: 0, y: height - 1 });
    fixedPixels.push({ x: width - 1, y: height - 1 });

    for (let i = 0; i < 22; i++) 
    {   const rx = (Math.random() * width) | 0;
        const ry = (Math.random() * height) | 0;
        fixedPixels.push({ x: rx, y: ry }); }

    for (let i = 0; i < fixedPixels.length; i++) 
    {   const p = fixedPixels[i];
        const idx = p.y * width + p.x;
        fixedColors.push(buffer[idx]);
        seedMask[idx] = 1; }

    computeTargetBuffer();
    shuffleRevealOrder(); }

function computeTargetBuffer() 
{   targetBuffer = new Uint32Array(totalPixels);

    for (let y = 0; y < height; y++) 
    {   for (let x = 0; x < width; x++) 
        {   const idx = y * width + x;

            if (seedMask[idx]) 
            {   targetBuffer[idx] = buffer[idx];
                continue; }

            let sumR = 0, sumG = 0, sumB = 0, totalWeight = 0;

            for (let s = 0; s < fixedPixels.length; s++) 
            {   const fp = fixedPixels[s];
                const dx = x - fp.x;
                const dy = y - fp.y;
                const distSq = dx * dx + dy * dy;

                if (distSq === 0) continue;

                const weight = 1 / distSq;
                const c = fixedColors[s];

                sumR += (c & 0xFF) * weight;
                sumG += ((c >> 8) & 0xFF) * weight;
                sumB += ((c >> 16) & 0xFF) * weight;
                totalWeight += weight; }

            const finalR = (sumR / totalWeight) | 0;
            const finalG = (sumG / totalWeight) | 0;
            const finalB = (sumB / totalWeight) | 0;

            targetBuffer[idx] = 0xFF000000 | (finalB << 16) | (finalG << 8) | finalR; } } }

function shuffleRevealOrder() 
{   revealOrder = [];

    for (let i = 0; i < totalPixels; i++) 
    {   if (!seedMask[i]) revealOrder.push(i); }

    for (let i = revealOrder.length - 1; i > 0; i--) 
    {   const j = (Math.random() * (i + 1)) | 0;
        const temp = revealOrder[i];
        revealOrder[i] = revealOrder[j];
        revealOrder[j] = temp; }

    revealIndex = 0; }

function applyDiffusion() 
{   const endIndex = Math.min(revealIndex + diffuseSpeed, revealOrder.length);

    for (let i = revealIndex; i < endIndex; i++) 
    {   const idx = revealOrder[i];
        buffer[idx] = targetBuffer[idx]; }

    revealIndex = endIndex; }

function applyPixels(count, pureColor) 
{   if (blendWeight === 0) 
    {   for (let i = 0; i < count; i++) 
        {   const x = (Math.random() * width) | 0;
            const y = (Math.random() * height) | 0;
            buffer[y * width + x] = pureColor; } 
    }
    else 
    {   const invW = 1 - blendWeight;
        const cR = pureColor & 0xFF;
        const cG = (pureColor >> 8) & 0xFF;
        const cB = (pureColor >> 16) & 0xFF;

        for (let i = 0; i < count; i++) 
        {   const x = (1 + Math.random() * (width - 2)) | 0;
            const y = (1 + Math.random() * (height - 2)) | 0;
            const idx = y * width + x;

            const n1 = buffer[idx - width];
            const n2 = buffer[idx + width];
            const n3 = buffer[idx - 1];
            const n4 = buffer[idx + 1];

            const sumR = (n1 & 0xFF) + (n2 & 0xFF) + (n3 & 0xFF) + (n4 & 0xFF);
            const sumG = ((n1 >> 8) & 0xFF) + ((n2 >> 8) & 0xFF) + ((n3 >> 8) & 0xFF) + ((n4 >> 8) & 0xFF);
            const sumB = ((n1 >> 16) & 0xFF) + ((n2 >> 16) & 0xFF) + ((n3 >> 16) & 0xFF) + ((n4 >> 16) & 0xFF);

            const avgR = sumR >> 2;
            const avgG = sumG >> 2;
            const avgB = sumB >> 2;

            const finalR = (cR * invW + avgR * blendWeight) | 0;
            const finalG = (cG * invW + avgG * blendWeight) | 0;
            const finalB = (cB * invW + avgB * blendWeight) | 0;

            buffer[idx] = 0xFF000000 | (finalB << 16) | (finalG << 8) | finalR; } 
    }
}

function animate() 
{   if (!isDiffusing) 
    {   applyPixels(kSpeed, COLOR_K);
        applyPixels(bSpeed, COLOR_B);
        applyPixels(cSpeed, COLOR_C);
        applyPixels(gSpeed, COLOR_G);
        applyPixels(ySpeed, COLOR_Y);
        applyPixels(rSpeed, COLOR_R);
        applyPixels(wSpeed, COLOR_W);
        applyPixels(mSpeed, COLOR_M); }
    else if (revealIndex < revealOrder.length) 
    {   applyDiffusion(); }

    ctx.putImageData(imgData, 0, 0);
    requestAnimationFrame(animate);
}

resize();
animate();
}

)
();

</script>
